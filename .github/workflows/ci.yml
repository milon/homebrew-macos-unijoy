name: CI
on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  test:
    name: Lint and audit cask
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - run: brew update
      - run: brew style Casks/macos-unijoy.rb
      - run: brew audit --cask --strict --online Casks/macos-unijoy.rb
