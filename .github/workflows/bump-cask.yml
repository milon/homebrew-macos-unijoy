name: Bump cask
on:
  repository_dispatch:
    types: [new-release]
  schedule:
    - cron: '17 6 * * *'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to bump to (e.g. 1.2.3). Leave empty for latest release.'
        required: false

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: Bump macos-unijoy cask
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Determine target version
        id: target
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            v="${{ github.event.inputs.version }}"
          elif [ -n "${{ github.event.client_payload.version }}" ]; then
            v="${{ github.event.client_payload.version }}"
          else
            v=$(gh release view --repo milon/macos-unijoy --json tagName -q .tagName)
          fi
          v="${v#v}"
          echo "version=$v" >> "$GITHUB_OUTPUT"

      - name: Read current version
        id: current
        run: |
          cur=$(awk -F\" '/^  version /{print $2; exit}' Casks/macos-unijoy.rb)
          echo "version=$cur" >> "$GITHUB_OUTPUT"

      - name: Compare versions
        id: check
        run: |
          if [ "${{ steps.target.outputs.version }}" = "${{ steps.current.outputs.version }}" ]; then
            echo "Cask already at ${{ steps.current.outputs.version }}; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Bumping ${{ steps.current.outputs.version }} -> ${{ steps.target.outputs.version }}"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download tarball and compute sha256
        if: steps.check.outputs.skip != 'true'
        id: sha
        run: |
          v="${{ steps.target.outputs.version }}"
          url="https://github.com/milon/macos-unijoy/archive/refs/tags/v${v}.tar.gz"
          curl -fsSL --retry 5 --retry-delay 5 -o release.tar.gz "$url"
          sha=$(shasum -a 256 release.tar.gz | awk '{print $1}')
          rm -f release.tar.gz
          echo "sha256=$sha" >> "$GITHUB_OUTPUT"

      - name: Update cask file
        if: steps.check.outputs.skip != 'true'
        run: |
          v="${{ steps.target.outputs.version }}"
          sha="${{ steps.sha.outputs.sha256 }}"
          /usr/bin/sed -i '' -E "s/^([[:space:]]*version )\"[^\"]*\"/\1\"$v\"/" Casks/macos-unijoy.rb
          /usr/bin/sed -i '' -E "s/^([[:space:]]*sha256 )\"[^\"]*\"/\1\"$sha\"/" Casks/macos-unijoy.rb
          echo "--- Updated cask ---"
          cat Casks/macos-unijoy.rb

      - name: Lint and audit
        if: steps.check.outputs.skip != 'true'
        run: |
          brew update
          brew style Casks/macos-unijoy.rb
          brew audit --cask --strict --online Casks/macos-unijoy.rb

      - name: Create pull request
        if: steps.check.outputs.skip != 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bump-cask/${{ steps.target.outputs.version }}
          commit-message: "macos-unijoy ${{ steps.target.outputs.version }}"
          title: "macos-unijoy ${{ steps.target.outputs.version }}"
          body: |
            Auto-bump triggered by release
            [`v${{ steps.target.outputs.version }}`](https://github.com/milon/macos-unijoy/releases/tag/v${{ steps.target.outputs.version }})
            in `milon/macos-unijoy`.

            - version: `${{ steps.current.outputs.version }}` → `${{ steps.target.outputs.version }}`
            - sha256: `${{ steps.sha.outputs.sha256 }}`
          delete-branch: true
